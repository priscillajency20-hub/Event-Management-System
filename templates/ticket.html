{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-center">
    <div class="card shadow-lg text-center" style="width: 25rem; border-top: 5px solid #0d6efd;">
        <div class="card-body">
            <h3 class="card-title text-primary">OFFICIAL TICKET</h3>
            <hr>
            <h5>{{ event.title }}</h5>
            <p><strong>Guest:</strong> {{ guest.name }}</p>
            <p><strong>Ticket ID:</strong> {{ guest.ticket_id }}</p>
            
            <img src="{{ url_for('qr_image', ticket_id=guest.ticket_id) }}" alt="QR Code" class="img-fluid my-3" style="border: 1px solid #ddd; padding: 10px;">
            
            <p class="small text-muted">Please show this QR code at the entrance.</p>
            <button onclick="window.print()" class="btn btn-outline-dark btn-sm">Print Ticket</button>
        </div>
    </div>
</div>
{% endblock %}
