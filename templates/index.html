{% extends "layout.html" %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-4 fw-bold">Discover Campus Events</h1>
    <p class="lead">Register now and get your instant QR Ticket!</p>
</div>

<div class="row">
    {% for event in events %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ event.title }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ event.date }} | {{ event.category }}</h6>
                <p class="card-text">{{ event.description }}</p>
                <a href="{{ url_for('event_detail', event_id=event.id) }}" class="btn btn-primary w-100">View Details & Register</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
